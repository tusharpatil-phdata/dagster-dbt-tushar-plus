name: dagsterCloud-dbt-project
version: '1.0.0'
config-version: 2

profile: dagsterCloud-dbt-project

model-paths:    [models]
seed-paths:     [seeds]
test-paths:     [tests]
analysis-paths: [analyses]
macro-paths:    [macros]
snapshot-paths: [snapshots]

target-path: target
clean-targets: [target, dbt_packages]

seeds:
  dagsterCloud-dbt-project:
    customer:
      +database: DAGSTER_DBT_KIEWIT_DB_PLUS
      +schema: SOURCE
      +quote_columns: false
      +column_types:
        id: varchar(36)
        name: varchar(100)
      +group: source

models:
  dagsterCloud-dbt-project:
    lz:
      +database: DAGSTER_DBT_KIEWIT_DB_PLUS
      +schema: LZ
      +materialized: table
      +tags: [lz, bronze]
      +group: bronze
    staging:
      +database: DAGSTER_DBT_KIEWIT_DB_PLUS
      +schema: STAGING
      +materialized: view
      +tags: [staging, silver]
      +group: silver
    dbo:
      +database: DAGSTER_DBT_KIEWIT_DB_PLUS
      +schema: DBO
      +materialized: table
      +tags: [dbo, gold]
      +group: gold