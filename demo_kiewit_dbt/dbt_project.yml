name: demo_kiewit_dbt
version: '1.0.0'
config-version: 2

profile: default

model-paths:    [models]
seed-paths:     [seeds]
test-paths:     [tests]
analysis-paths: [analyses]
macro-paths:    [macros]
snapshot-paths: [snapshots]

target-path: target
clean-targets: [target, dbt_packages]

groups:
  - name: source
    owner:
      name: kiewit_team
  - name: bronze
    owner:
      name: kiewit_team
  - name: silver
    owner:
      name: kiewit_team
  - name: gold
    owner:
      name: kiewit_teams

seeds:
  demo_kiewit_dbt:
    customer:
      +database: DAGSTER_DBT_KIEWIT_DB
      +schema: source
      +quote_columns: false
      +column_types:
        id: varchar(36)
        name: varchar(100)
      +group: source

models:
  demo_kiewit_dbt:
    lz:
      +database: DAGSTER_DBT_KIEWIT_DB
      +schema: lz
      +materialized: table
      +tags: [lz, bronze]
      +group: bronze
    staging:
      +database: DAGSTER_DBT_KIEWIT_DB
      +schema: staging
      +materialized: view
      +tags: [staging, silver]
      +group: silver
    dbo:
      +database: DAGSTER_DBT_KIEWIT_DB
      +schema: dbo
      +materialized: table
      +tags: [dbo, gold]
      +group: gold